<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBT Talks - Pro Messenger</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #ece5dd; margin: 0; }
        .hidden { display: none !important; }
        
        /* লগইন স্টাইল */
        #login-container { padding: 40px 20px; text-align: center; background: white; height: 100vh; }
        input { width: 80%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 12px 25px; background: #075e54; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* মেইন অ্যাপ স্টাইল */
        .app-container { max-width: 500px; margin: auto; background: white; height: 100vh; display: flex; flex-direction: column; position: relative; }
        header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #search-area { padding: 10px; background: #f0f0f0; display: flex; gap: 5px; }
        
        /* চ্যাট স্টাইল */
        #chat-window { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #e5ddd5; display: flex; flex-direction: column; z-index: 10; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { margin: 5px; padding: 8px 12px; border-radius: 8px; max-width: 75%; word-wrap: break-word; font-size: 15px; }
        .sent { align-self: flex-end; background: #dcf8c6; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .received { align-self: flex-start; background: white; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="login-container">
    <h2>EBT Talks</h2>
    <p>আপনার ফোন নম্বর দিয়ে লগইন করুন</p>
    <input type="text" id="phone-number" placeholder="+88017XXXXXXXX">
    <div id="recaptcha-container"></div>
    <button id="send-otp-btn" onclick="sendOTP()">OTP পাঠান</button>

    <div id="otp-section" class="hidden">
        <input type="text" id="otp-code" placeholder="৬ ডিজিটের কোড দিন">
        <button onclick="verifyOTP()">ভেরিফাই করুন</button>
    </div>
</div>

<div id="app-screen" class="app-container hidden">
    <header>
        <span>EBT Talks</span>
        <button onclick="auth.signOut()" style="background:#128c7e; font-size:12px;">Logout</button>
    </header>

    <div id="search-area">
        <input type="text" id="search-input" placeholder="বন্ধুর নম্বর (+880...)">
        <button onclick="searchUser()">খুঁজুন</button>
    </div>

    <div id="user-list" style="padding: 20px; color: gray; text-align: center;">
        নম্বর দিয়ে সার্চ করে চ্যাট শুরু করুন।
    </div>

    <div id="chat-window" class="hidden">
        <div style="background: #075e54; color: white; padding: 15px; display: flex; align-items: center;">
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-size: 20px;">←</button>
            <span id="chat-with-name" style="margin-left: 10px;"></span>
        </div>
        <div id="messages"></div>
        <div style="padding: 10px; background: #f0f0f0; display: flex;">
            <input type="text" id="msg-input" placeholder="মেসেজ লিখুন..." style="flex:1; margin:0;">
            <button onclick="sendMessage()" style="margin-left:5px;">পাঠান</button>
        </div>
    </div>
</div>

<script>
    // আপনার ফায়ারবেস কনফিগ (আগেরটাই)
    const firebaseConfig = {
    apiKey: "AIzaSyAaZq0alRZp-fOrrbwpY7FNm_QlRNOsNxQ",
    authDomain: "ebt-talks-55161.firebaseapp.com",
    projectId: "ebt-talks-55161",
    storageBucket: "ebt-talks-55161.firebasestorage.app",
    messagingSenderId: "215662903322",
    appId: "1:215662903322:web:8df68607a596d1c29691a3"
  };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let myNumber = "";
    let currentChatFriend = "";

    // লগইন চেক
    auth.onAuthStateChanged(user => {
        if (user) {
            myNumber = user.phoneNumber;
            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            
            // অটো রেজিস্ট্রেশন: ডাটাবেজে ইউজার সেভ করা
            db.collection("users").doc(myNumber).set({
                number: myNumber,
                status: "Online"
            }, { merge: true });
        } else {
            document.getElementById('login-container').classList.remove('hidden');
            document.getElementById('app-screen').classList.add('hidden');
        }
    });

    // ১. ওটিপি পাঠানো
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {size: 'invisible'});
    function sendOTP() {
        const num = document.getElementById('phone-number').value;
        auth.signInWithPhoneNumber(num, window.recaptchaVerifier).then(res => {
            window.confirmationResult = res;
            document.getElementById('otp-section').classList.remove('hidden');
            document.getElementById('send-otp-btn').classList.add('hidden');
        }).catch(err => alert("এরর: " + err.message));
    }

    // ২. ওটিপি ভেরিফাই
    function verifyOTP() {
        const code = document.getElementById('otp-code').value;
        confirmationResult.confirm(code).catch(err => alert("ভুল কোড!"));
    }

    // ৩. বন্ধু খোঁজা
    function searchUser() {
        const num = document.getElementById('search-input').value.trim();
        if(num === myNumber) return alert("নিজের নম্বর সার্চ করবেন না!");
        
        db.collection("users").doc(num).get().then(doc => {
            if (doc.exists) { openChat(num); } 
            else { alert("এই নম্বরে কেউ অ্যাকাউন্ট খোলেনি। তাকে একবার লগইন করতে বলুন।"); }
        });
    }

    // ৪. চ্যাট ফাংশন
    function openChat(num) {
        currentChatFriend = num;
        document.getElementById('chat-window').classList.remove('hidden');
        document.getElementById('chat-with-name').innerText = num;
        loadMessages();
    }

    function sendMessage() {
        const text = document.getElementById('msg-input').value;
        if(!text) return;
        const chatId = [myNumber, currentChatFriend].sort().join('_');
        db.collection("chats").doc(chatId).collection("messages").add({
            sender: myNumber,
            text: text,
            time: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('msg-input').value = "";
    }

    function loadMessages() {
        const chatId = [myNumber, currentChatFriend].sort().join('_');
        db.collection("chats").doc(chatId).collection("messages").orderBy("time")
            .onSnapshot(snap => {
                const msgDiv = document.getElementById('messages');
                msgDiv.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const div = document.createElement('div');
                    div.className = `msg ${d.sender === myNumber ? 'sent' : 'received'}`;
                    div.innerText = d.text;
                    msgDiv.appendChild(div);
                });
                msgDiv.scrollTop = msgDiv.scrollHeight;
            });
    }

    function closeChat() { document.getElementById('chat-window').classList.add('hidden'); }
</script>

</body>
</html>
